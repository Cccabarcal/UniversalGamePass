<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crear Suscripcion</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --card: #ffffff;
      --ink: #1c1b19;
      --accent: #0f766e;
      --muted: #6b7280;
      --border: #e6e2d9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Georgia", "Times New Roman", serif;
      color: var(--ink);
      background: radial-gradient(circle at 15% 15%, #fff1dc, var(--bg));
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }
    .card {
      width: min(520px, 92vw);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
      padding: 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0.2px;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      background: #fff;
    }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
    }
    .hint {
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Crear suscripcion</h1>
    <p>Selecciona un plan activo y confirma para crear la suscripcion.</p>
    {% if messages %}
      {% for message in messages %}
        <p>{{ message }}</p>
      {% endfor %}
    {% endif %}
    <form method="post" action="/suscripciones/crear/">
      {% csrf_token %}
      <label for="plan_id">Plan</label>
      <select id="plan_id" name="plan_id" required>
        {% for plan in planes %}
          <option value="{{ plan.id }}">{{ plan.nombre }} ({{ plan.duracion_dias }} dias)</option>
        {% empty %}
          <option value="">No hay planes activos</option>
        {% endfor %}
      </select>
      <button type="submit">Crear suscripcion</button>
    </form>
    <div class="hint">Debes iniciar sesion para crear una suscripcion.</div>
  </main>
</body>
</html>
