<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mi Perfil</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --card: #ffffff;
      --ink: #1c1b19;
      --accent: #0f766e;
      --muted: #6b7280;
      --border: #e6e2d9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Georgia", "Times New Roman", serif;
      color: var(--ink);
      background: radial-gradient(circle at 15% 15%, #fff1dc, var(--bg));
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }
    .card {
      width: min(520px, 92vw);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
      padding: 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      letter-spacing: 0.2px;
    }
    .info {
      background: #f3f4f6;
      padding: 16px;
      border-radius: 10px;
      margin: 16px 0;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }
    .label {
      font-weight: 600;
      color: var(--muted);
    }
    .value {
      color: var(--ink);
    }
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }
    a, button {
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: 0.2s;
      text-align: center;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      opacity: 0.9;
    }
    .btn-secondary {
      background: #f3f4f6;
      color: var(--ink);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: #e5e7eb;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Mi Perfil</h1>
    
    <div class="info">
      <div class="info-row">
        <span class="label">Usuario:</span>
        <span class="value">{{ user.username }}</span>
      </div>
      <div class="info-row">
        <span class="label">Email:</span>
        <span class="value">{{ user.email }}</span>
      </div>
      <div class="info-row">
        <span class="label">Miembro desde:</span>
        <span class="value">{{ user.date_joined|date:"d/m/Y" }}</span>
      </div>
    </div>

    <div class="button-group">
      <a href="/suscripciones/nueva/" class="btn-primary">Ver Suscripciones</a>
      <a href="/" class="btn-secondary">Volver al Inicio</a>
      <a href="/accounts/logout/" class="btn-secondary">Cerrar Sesion</a>
    </div>
  </main>
</body>
</html>
