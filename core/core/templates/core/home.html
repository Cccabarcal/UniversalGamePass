<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UniversalGamePass</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --card: #ffffff;
      --ink: #1c1b19;
      --accent: #0f766e;
      --muted: #6b7280;
      --border: #e6e2d9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Georgia", "Times New Roman", serif;
      color: var(--ink);
      background: radial-gradient(circle at 15% 15%, #fff1dc, var(--bg));
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }
    .card {
      width: min(520px, 92vw);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
      padding: 28px;
      text-align: center;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      letter-spacing: 0.2px;
    }
    .subtitle {
      color: var(--muted);
      margin: 0 0 24px;
      font-size: 16px;
    }
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }
    a, button {
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      opacity: 0.9;
    }
    .btn-secondary {
      background: #f3f4f6;
      color: var(--ink);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: #e5e7eb;
    }
    .status {
      padding: 12px;
      background: #dbeafe;
      border-radius: 10px;
      margin-top: 16px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>UniversalGamePass</h1>
    <p class="subtitle">Gestión de Suscripciones</p>
    
    {% if user.is_authenticated %}
      <p class="status">Bienvenido, <strong>{{ user.username }}</strong></p>
      <div class="button-group">
        <a href="/suscripciones/nueva/" class="btn-primary">Mis Suscripciones</a>
        <a href="/accounts/logout/" class="btn-secondary">Cerrar Sesion</a>
      </div>
    {% else %}
      <div class="button-group">
        <a href="/accounts/login/" class="btn-primary">Iniciar Sesion</a>
        <a href="/accounts/signup/" class="btn-secondary">Registrarse</a>
      </div>
    {% endif %}
  </main>
</body>
</html>
